name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Prepare demo for Pages
        run: |
          # Copy the built component into the demo folder
          cp dist/banking-search.js demo/

          # Swap the Vite dev import for the production build
          sed -i 's|src="../src/index.ts"|src="./banking-search.js"|' demo/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo

      - uses: actions/deploy-pages@v4
        id: deployment
